name: runtime-v1-perf

on:
  workflow_dispatch:
  schedule:
    - cron: "30 1 * * *"

jobs:
  perf-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run runtime v1 performance check
        run: |
          PYTHONPATH=src python scripts/runtime_v1_perf_check.py --write-baseline
          PYTHONPATH=src python scripts/runtime_v1_perf_check.py

      - name: Upload perf artifacts
        uses: actions/upload-artifact@v4
        with:
          name: runtime-v1-perf-report
          path: |
            runs/perf/runtime_v1/perf_report.json
            runs/perf/runtime_v1/perf_baseline.json
